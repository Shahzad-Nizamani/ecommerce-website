<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShopSphere | Product Details</title>
  <link rel="stylesheet" href="/public/css/styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/">ShopSphere</a>
    <nav class="nav-links">
      <a href="/">Home</a>
      <a class="active" href="/products">Shop</a>
    </nav>
  </header>

  <main class="container">
    <section class="detail-layout">
      <img src="{{ product.image }}" alt="{{ product.name }}" />
      <div class="detail-content">
        <p class="chip">{{ product.category }}</p>
        <h1>{{ product.name }}</h1>
        <p class="detail-copy">{{ product.description }}</p>
        <p class="price">Price: ${{ "%.2f"|format(product.price) }}</p>
        <div class="hero-actions">
          <a class="btn" href="/products">Back to Products</a>
          <a class="btn btn-ghost" href="/">Continue Shopping</a>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">FastAPI route: /products/{{ product.id }}</footer>
  <script src="/public/js/main.js"></script>
</body>
</html>
