<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand | Sign Up</title>
  <link rel="stylesheet" href="/public/css/styles.css" />
  <style>
    .auth-container {
      max-width: 400px;
      margin: 50px auto;
      padding: 30px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #f9f9f9;
    }

    .auth-container h2 {
      text-align: center;
      margin-bottom: 30px;
      color: #333;
    }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }

    .form-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 4px;
      font-size: 14px;
      box-sizing: border-box;
    }

    .form-group input:focus {
      outline: none;
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }

    .btn-submit {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      border-radius: 4px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    .btn-submit:hover {
      background: #218838;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #f5c6cb;
    }

    .success {
      background: #d4edda;
      color: #155724;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 20px;
      border: 1px solid #c3e6cb;
    }

    .auth-links {
      text-align: center;
      margin-top: 20px;
    }

    .auth-links a {
      color: #007bff;
      text-decoration: none;
    }

    .auth-links a:hover {
      text-decoration: underline;
    }

    .auth-links p {
      margin: 0;
      font-size: 14px;
    }

    .password-note {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="top-row">
      <a class="brand" href="/" aria-label="Brand home">
        <span class="brand-mark" aria-hidden="true">&#128717;</span>
        <span class="brand-text">Brand</span>
      </a>
      <div class="quick-actions">
        <a href="/auth/login">Login</a>
        <a href="/auth/signup">Sign up</a>
        <a href="/products">Products</a>
      </div>
    </div>
  </header>

  <main class="container">
    <div class="auth-container">
      <h2>Create Your Account</h2>

      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}

      {% if success %}
      <div class="success">{{ success }}</div>
      {% endif %}

      <form method="post" action="/auth/signup">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" required />
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
          <div class="password-note">Minimum 6 characters</div>
        </div>

        <div class="form-group">
          <label for="password_confirm">Confirm Password</label>
          <input type="password" id="password_confirm" name="password_confirm" required />
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <div class="auth-links">
        <p>Already have an account? <a href="/auth/login">Login here</a></p>
      </div>
    </div>
  </main>

  <footer style="text-align: center; padding: 20px; color: #666; margin-top: 50px;">
    <p>&copy; 2024 Brand. All rights reserved.</p>
  </footer>
</body>
</html>
